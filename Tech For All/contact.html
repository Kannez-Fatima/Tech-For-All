<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - TechForAll</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#050816;
      overflow-x:hidden;
      font-family:'Poppins',sans-serif;
    }

    .glass{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:0 8px 40px rgba(0,0,0,0.35);
    }

    .blob{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.45;
      animation:float 8s ease-in-out infinite;
    }

    .blob2{
      animation-delay:2s;
    }

    .blob3{
      animation-delay:4s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0) translateX(0);
      }
      50%{
        transform:translateY(-40px) translateX(20px);
      }
    }

    .fade-up{
      animation:fadeUp 1s ease forwards;
      opacity:0;
    }

    @keyframes fadeUp{
      from{
        transform:translateY(60px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
    }

    input,textarea{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      outline:none;
      transition:.4s;
    }

    input:focus,textarea:focus{
      border-color:#22d3ee;
      box-shadow:0 0 20px rgba(34,211,238,.3);
    }

    .contact-box:hover{
      transform:translateY(-8px);
    }
  </style>
</head>

<body class="text-white relative min-h-screen">

  <!-- Background Blobs -->
  <div class="blob bg-cyan-500 w-72 h-72 top-10 left-10"></div>
  <div class="blob blob2 bg-pink-500 w-72 h-72 bottom-10 right-10"></div>
  <div class="blob blob3 bg-purple-500 w-72 h-72 top-1/2 left-1/2"></div>

  <!-- Main Section -->
  <section class="relative z-10 px-6 md:px-16 py-20">

    <!-- Heading -->
    <div class="text-center mb-20 fade-up">
      <h1 class="text-5xl md:text-7xl font-black uppercase tracking-widest">
        Contact Us
      </h1>

      <p class="text-gray-300 mt-6 max-w-2xl mx-auto text-lg leading-8">
        Have a project or idea? Let's connect and build
        something creative together with TechForAll.
      </p>
    </div>

    <!-- Contact Layout -->
    <div class="grid lg:grid-cols-2 gap-10 items-center">

      <!-- Left Side -->
      <div class="space-y-6 fade-up">

        <div class="glass contact-box rounded-[30px] p-8 transition duration-500">
          <h2 class="text-2xl font-bold mb-3">
            Email
          </h2>

          <p class="text-gray-300">
            mianbilaltech751@gmail.com
          </p>
        </div>

        <div class="glass contact-box rounded-[30px] p-8 transition duration-500">
          <h2 class="text-2xl font-bold mb-3">
            Phone
          </h2>

          <p class="text-gray-300">
            +92 315 5120134
          </p>
        </div>

        <div class="glass contact-box rounded-[30px] p-8 transition duration-500">
          <h2 class="text-2xl font-bold mb-3">
            Location
          </h2>

          <p class="text-gray-300">
            Pakistan
          </p>
        </div>

      </div>

      <!-- Contact Form -->
      <div class="glass rounded-[35px] p-8 md:p-12 fade-up">

        <h2 class="text-4xl font-bold mb-10">
          Send Message
        </h2>

        <form class="space-y-6">

          <input
            type="text"
            placeholder="Your Name"
            class="w-full px-5 py-4 rounded-2xl text-white"
          />

          <input
            type="email"
            placeholder="Your Email"
            class="w-full px-5 py-4 rounded-2xl text-white"
          />

          <input
            type="text"
            placeholder="Subject"
            class="w-full px-5 py-4 rounded-2xl text-white"
          />

          <textarea
            rows="5"
            placeholder="Your Message"
            class="w-full px-5 py-4 rounded-2xl text-white resize-none"
          ></textarea>

          <button onclick="chatOpen()"
            type="submit"
            class="w-full glass py-4 rounded-2xl text-lg font-semibold hover:scale-105 transition duration-500"
          >
            Send Message
          </button>

        </form>

      </div>

    </div>

  </section>
<script>
function chatOpen() {
  window.open("https://wa.me/923155120134", "_blank");
}

</script>
</body>
</html>
